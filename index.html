<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdFlix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { height:6px; width:6px; }
    ::-webkit-scrollbar-thumb { background:#555; border-radius:3px; }
    .movie-card:hover { transform:scale(1.08); z-index:20; }
    .hero-gradient { background:linear-gradient(to bottom,rgba(20,20,20,0) 0%,rgba(20,20,20,0.6) 50%,rgba(20,20,20,1) 100%); }
  </style>
  <script>
    tailwind.config={theme:{extend:{colors:{'edflix-red':'#E50914','edflix-dark':'#141414','edflix-gray':'#181818','edflix-light-gray':'#2F2F2F'}}}};
  </script>
</head>
<body class="bg-edflix-dark text-white min-h-screen">
  <div id="app"></div>
  <script>
    const DATA=[{tmdbId:155,title:"The Dark Knight",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Steelbook edition",dateAdded:"2023-01-15",genre:["Action","Crime","Drama"],tags:["favorites","superhero"]},{tmdbId:680,title:"Pulp Fiction",formats:["Blu-ray","DVD"],location:"Living Room Shelf B",status:"available",dateAdded:"2022-06-20",genre:["Thriller","Crime"],tags:["classics"]},{tmdbId:238,title:"The Godfather",formats:["4K UHD","Blu-ray","DVD"],location:"Living Room Shelf A",status:"available",dateAdded:"2021-12-25",genre:["Drama","Crime"],tags:["classics","favorites"]},{tmdbId:550,title:"Fight Club",formats:["Blu-ray"],location:"Bedroom Shelf",status:"checked-out",checkedOutBy:"Dad",dateAdded:"2023-03-10",genre:["Drama"],tags:["cult-classics"]},{tmdbId:13,title:"Forrest Gump",formats:["DVD","VHS"],location:"Living Room Shelf B",status:"available",dateAdded:"2020-08-01",genre:["Comedy","Drama","Romance"],tags:["family-friendly","classics"]},{tmdbId:11,title:"Star Wars",formats:["4K UHD","Blu-ray","VHS"],location:"Living Room Shelf A",status:"available",dateAdded:"2019-05-04",genre:["Adventure","Action","Science Fiction"],tags:["favorites","sci-fi"]},{tmdbId:120,title:"The Lord of the Rings: The Fellowship of the Ring",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Extended Edition",dateAdded:"2022-01-10",genre:["Adventure","Fantasy","Action"],tags:["favorites","fantasy"]},{tmdbId:497,title:"The Green Mile",formats:["Blu-ray"],location:"Living Room Shelf B",status:"available",dateAdded:"2023-06-15",genre:["Fantasy","Drama","Crime"],tags:["classics"]},{tmdbId:157336,title:"Interstellar",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"lent-out",checkedOutBy:"Uncle Mike",dateAdded:"2023-09-01",genre:["Adventure","Drama","Science Fiction"],tags:["favorites","sci-fi"]},{tmdbId:278,title:"The Shawshank Redemption",formats:["Blu-ray","DVD"],location:"Living Room Shelf B",status:"available",dateAdded:"2021-03-20",genre:["Drama","Crime"],tags:["classics","favorites"]},{tmdbId:603,title:"The Matrix",formats:["4K UHD","DVD"],location:"Bedroom Shelf",status:"available",dateAdded:"2022-11-10",genre:["Action","Science Fiction"],tags:["sci-fi","cult-classics"]},{tmdbId:389,title:"12 Angry Men",formats:["DVD"],location:"Living Room Shelf B",status:"available",dateAdded:"2020-02-14",genre:["Drama"],tags:["classics"]},{tmdbId:24428,title:"The Avengers",formats:["Blu-ray","DVD"],location:"Kids Room",status:"available",dateAdded:"2022-07-04",genre:["Science Fiction","Action","Adventure"],tags:["family-friendly","superhero"]},{tmdbId:862,title:"Toy Story",formats:["Blu-ray","DVD","VHS"],location:"Kids Room",status:"available",dateAdded:"2019-11-22",genre:["Animation","Comedy","Family"],tags:["family-friendly","kids","animation"]},{tmdbId:150540,title:"Inside Out",formats:["Blu-ray"],location:"Kids Room",status:"checked-out",checkedOutBy:"Kids",dateAdded:"2023-04-20",genre:["Animation","Family","Comedy"],tags:["family-friendly","kids","animation"]},{tmdbId:122,title:"The Lord of the Rings: The Return of the King",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Extended Edition",dateAdded:"2022-01-10",genre:["Adventure","Fantasy","Action"],tags:["favorites","fantasy"]},{tmdbId:121,title:"The Lord of the Rings: The Two Towers",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Extended Edition",dateAdded:"2022-01-10",genre:["Adventure","Fantasy","Action"],tags:["favorites","fantasy"]},{tmdbId:27205,title:"Inception",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",dateAdded:"2023-02-28",genre:["Action","Science Fiction","Adventure"],tags:["favorites","sci-fi"]},{tmdbId:807,title:"Se7en",formats:["Blu-ray"],location:"Bedroom Shelf",status:"available",dateAdded:"2023-10-31",genre:["Crime","Mystery","Thriller"],tags:["thriller"]},{tmdbId:105,title:"Back to the Future",formats:["4K UHD","Blu-ray","VHS"],location:"Living Room Shelf A",status:"available",dateAdded:"2020-10-21",genre:["Adventure","Comedy","Science Fiction"],tags:["family-friendly","classics","sci-fi"]}];
    const KEY='';
    const IMG='https://image.tmdb.org/t/p';
    let movies=[],search='',filter='all',modalId=null;
    async function load(){
      if(!KEY){movies=DATA.map(d=>({...d,tmdbData:null}));render();return;}
      movies=await Promise.all(DATA.map(async d=>{
        try{let r=await fetch(`${IMG}/movie/${d.tmdbId}?api_key=${KEY}`);return{...d,tmdbData:r.ok?await r.json():null};}catch{return{...d,tmdbData:null};}
      }));
      render();
    }
    function filtered(){
      let r=movies;
      if(search.trim()){let q=search.toLowerCase();r=r.filter(m=>m.title.toLowerCase().includes(q)||m.genre?.some(g=>g.toLowerCase().includes(q))||m.tags?.some(t=>t.toLowerCase().includes(q))||m.location?.toLowerCase().includes(q)||m.checkedOutBy?.toLowerCase().includes(q)||m.formats.some(f=>f.toLowerCase().includes(q)));}
      if(filter==='available')r=r.filter(m=>m.status==='available');
      else if(filter==='checked-out')r=r.filter(m=>m.status!=='available');
      else if(['4K UHD','Blu-ray','DVD','VHS'].includes(filter))r=r.filter(m=>m.formats.includes(filter));
      return r;
    }
    function cats(fr){
      if(search.trim())return[{title:`Search Results for "${search}"`,movies:fr}];
      let c=[];
      let ra=[...fr].sort((a,b)=>(b.dateAdded||'').localeCompare(a.dateAdded||'')).slice(0,15);if(ra.length)c.push({title:'Recently Added',movies:ra});
      let fav=fr.filter(m=>m.tags?.includes('favorites'));if(fav.length)c.push({title:'Family Favorites',movies:fav});
      let k=fr.filter(m=>m.formats.includes('4K UHD'));if(k.length)c.push({title:'4K Ultra HD Collection',movies:k});
      let g=new Map();fr.forEach(m=>m.genre?.forEach(h=>{if(!g.has(h))g.set(h,[]);g.get(h).push(m);}));
      [...g.entries()].sort((a,b)=>b[1].length-a[1].length).forEach(([t,m])=>{if(m.length>=2)c.push({title:t,movies:m});});
      let un=fr.filter(m=>m.status!=='available');if(un.length)c.push({title:'Currently Checked Out',movies:un});
      let loc=new Map();fr.forEach(m=>{if(m.location){if(!loc.has(m.location))loc.set(m.location,[]);loc.get(m.location).push(m);}});
      loc.forEach((m,l)=>{if(m.length>=2)c.push({title:`📍 ${l}`,movies:m});});
      return c;
    }
    function st(s,who){const x={available:{c:'text-green-400',l:'Available'},'checked-out':{c:'text-yellow-400',l:`With ${who||'?'}`},'lent-out':{c:'text-red-400',l:`Lent to ${who||'?'}`}};return x[s]||x.available;}
    function badge(f){const m={'4K UHD':'4K','Blu-ray':'BD','DVD':'DVD','VHS':'VHS','Steelbook':'STEEL','LaserDisc':'LD','HD DVD':'HD'};return`<span class="inline-block rounded font-bold uppercase tracking-wider text-[10px] px-1.5 py-0.5 bg-edflix-light-gray border border-gray-600">${m[f]||f}</span>`;}
    function card(m){
      let t=m.tmdbData||{};let y=(t.release_date||'').split('-')[0]||'';let r=t.vote_average?t.vote_average.toFixed(1):null;let s=st(m.status,m.checkedOutBy);
      return`<button onclick="openModal(${m.tmdbId})" class="movie-card flex-shrink-0 w-[160px] md:w-[200px] group cursor-pointer text-left transition-transform duration-300 focus:outline-none focus:ring-2 focus:ring-edflix-red rounded-md"><div class="relative rounded-md overflow-hidden bg-edflix-gray aspect-[2/3]">${t.poster_path?`<img src="${IMG}/w500${t.poster_path}" alt="${m.title}" class="w-full h-full object-cover" loading="lazy" />`:`<div class="w-full h-full flex items-center justify-center text-gray-500 text-sm px-2 text-center">${m.title}</div>`}${m.status!=='available'?`<div class="absolute top-2 right-2 bg-black/80 rounded-full p-1 text-xs ${s.c}">●</div>`:''}<div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3"><div class="flex items-center gap-1.5 mb-1.5 flex-wrap">${m.formats.map(f=>badge(f)).join('')}</div><p class="text-white text-xs font-semibold truncate">${m.title}</p><div class="flex items-center gap-2 text-[10px] text-gray-300 mt-0.5">${y?`<span>${y}</span>`:''}${r?`<span class="text-yellow-400">★ ${r}</span>`:''}</div><div class="flex items-center gap-1 mt-1 text-[10px] ${s.c}"><span>${s.l}</span></div>${m.location?`<div class="text-[10px] text-gray-400 mt-0.5 truncate">📍 ${m.location}</div>`:''}</div></div></button>`;
    }
    function row(c,i){
      return`<div class="mb-8"><h2 class="text-lg md:text-xl font-bold text-white mb-3 px-4 md:px-12">${c.title}<span class="text-sm font-normal text-gray-400 ml-3">${c.movies.length} title${c.movies.length!==1?'s':''}</span></h2><div class="relative"><button onclick="scrollR(${i},-1)" class="absolute left-0 top-0 bottom-0 z-20 w-10 md:w-12 bg-black/50 hover:bg-black/80 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">‹</button><div id="r${i}" class="flex gap-2 md:gap-3 overflow-x-auto px-4 md:px-12 pb-2" style="scrollbar-width:none">${c.movies.map(card).join('')}</div><button onclick="scrollR(${i},1)" class="absolute right-0 top-0 bottom-0 z-20 w-10 md:w-12 bg-black/50 hover:bg-black/80 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">›</button></div></div>`;
    }
    function scrollR(i,d){let e=document.getElementById('r'+i);if(e)e.scrollBy({left:d*e.clientWidth*0.75,behavior:'smooth'});}
    function openModal(id){modalId=id;document.body.style.overflow='hidden';render();}
    function closeModal(){modalId=null;document.body.style.overflow='';render();}
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modalId)closeModal();});
    function render(){
      let fr=filtered();let ca=cats(fr);let html='';
      html+=`<nav class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-b from-black/90 to-transparent px-4 md:px-12 py-4 flex items-center justify-between"><div class="flex items-center gap-3"><span class="text-2xl">🎬</span><h1 class="text-2xl md:text-3xl font-bold text-edflix-red tracking-tight">EdFlix</h1></div><div class="flex items-center gap-4"><div class="flex items-center bg-black/80 border border-white/30 rounded px-3 py-1.5"><span class="text-gray-400 mr-2">🔍</span><input type="text" placeholder="Search..." value="${search.replace(/"/g,'&quot;')}" oninput="search=this.value;render();" class="bg-transparent text-white text-sm outline-none w-48 md:w-72 placeholder:text-gray-500"/><button onclick="search='';render();" class="ml-2 text-gray-400 hover:text-white">✕</button></div></div></nav>`;
      html+=`<main class="min-h-screen bg-edflix-dark pt-20">`;
      const hero=!search&&fr.length>0?fr[Math.floor(Math.random()*Math.min(fr.length,5))]:null;
      if(hero&&hero.tmdbData?.backdrop_path){html+=`<div class="relative h-[60vh] md:h-[70vh]"><img src="${IMG}/original${hero.tmdbData.backdrop_path}" alt="${hero.title}" class="w-full h-full object-cover" /><div class="hero-gradient absolute inset-0"></div><div class="absolute bottom-16 left-4 md:left-12 max-w-xl z-10"><h2 class="text-3xl md:text-5xl font-bold text-white mb-2 drop-shadow-lg">${hero.title}</h2><p class="text-sm text-gray-200 line-clamp-3 mb-3 drop-shadow">${hero.tmdbData.overview||''}</p><div class="flex items-center gap-2 flex-wrap mb-3">${hero.formats.map(f=>`<span class="text-xs bg-white/20 backdrop-blur-sm text-white px-2.5 py-1 rounded">${f}</span>`).join('')}</div><button onclick="openModal(${hero.tmdbId})" class="bg-white text-black font-semibold px-6 py-2.5 rounded hover:bg-gray-200 transition-colors text-sm">More Info</button></div></div>`;}
      html+=`<div class="px-4 md:px-12 pb-4 relative z-10"><div class="flex items-center justify-between flex-wrap gap-3"><div class="flex items-center gap-3 text-sm text-gray-400"><span>💿</span><span><strong class="text-white">${movies.length}</strong> titles</span><span class="text-gray-600">|</span><span><strong class="text-green-400">${movies.filter(m=>m.status==='available').length}</strong> available</span></div><div class="flex items-center gap-2 flex-wrap">${[['All','all'],['Available','available'],['Checked Out','checked-out'],['4K UHD','4K UHD'],['Blu-ray','Blu-ray'],['DVD','DVD'],['VHS','VHS']].map(([l,v])=>`<button onclick="filter='${v}';render();" class="text-xs px-3 py-1.5 rounded-full transition-colors ${filter===v?'bg-white text-black font-semibold':'bg-edflix-light-gray text-gray-300 hover:bg-gray-600'}">${l}</button>`).join('')}</div></div></div>`;
      if(!KEY&&movies.length>0){html+=`<div class="mx-4 md:mx-12 mb-6 bg-yellow-900/30 border border-yellow-700 rounded-lg p-4"><p class="text-yellow-300 text-sm font-semibold mb-1">TMDB API Key Missing</p><p class="text-yellow-200/70 text-sm">Add <code class="bg-black/30 px-1.5 py-0.5 rounded">NEXT_PUBLIC_TMDB_API_KEY=your_key</code> to .env.local to load posters.</p></div>`;}
      if(fr.length===0)html+=`<div class="flex items-center justify-center py-24 text-center"><p class="text-gray-400 text-lg mb-2">No movies found</p><p class="text-gray-600 text-sm">Try a different search or filter</p></div>`;
      else html+=`<div class="pb-12">${ca.map(row).join('')}</div>`;
      html+=`</main>`;
      if(modalId){let m=movies.find(x=>x.tmdbId===modalId);if(m){let t=m.tmdbData||{};let y=(t.release_date||'').split('-')[0]||'';let r=t.vote_average?t.vote_average.toFixed(1):null;let s=st(m.status,m.checkedOutBy);html+=`<div class="modal-overlay fixed inset-0 z-[100] bg-black/80 flex items-start justify-center overflow-y-auto py-8 px-4" onclick="if(event.target===event.currentTarget)closeModal()"><div class="modal-content relative bg-edflix-gray rounded-lg overflow-hidden max-w-3xl w-full shadow-2xl"><button onclick="closeModal()" class="absolute top-4 right-4 z-30 bg-edflix-dark/80 hover:bg-edflix-dark rounded-full px-2 py-1 text-white">✕</button><div class="relative aspect-video bg-black">${t.backdrop_path?`<img src="${IMG}/w1280${t.backdrop_path}" alt="${m.title}" class="w-full h-full object-cover" />`:''}<div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-edflix-gray to-transparent"></div></div><div class="px-6 md:px-10 pb-8 -mt-8 relative z-10"><div class="flex gap-6"><div class="hidden md:block flex-shrink-0 w-36 -mt-24 relative z-20">${t.poster_path?`<img src="${IMG}/w500${t.poster_path}" alt="${m.title}" class="w-full rounded-lg shadow-xl" />`:''}</div><div class="flex-1 min-w-0"><h2 class="text-2xl md:text-3xl font-bold text-white mb-1">${m.title}</h2><div class="flex flex-wrap items-center gap-3 text-sm text-gray-300 mb-4">${y?`<span>📅 ${y}</span>`:''}${r?`<span class="text-yellow-400">★ ${r}</span>`:''}</div><div class="bg-edflix-dark rounded-lg p-4 mb-4"><div class="flex items-center gap-2 mb-3"><span class="text-edflix-red">💿</span><span class="text-sm font-semibold text-white">Physical Media</span></div><div class="flex flex-wrap gap-2 mb-3">${m.formats.map(badge).join('')}</div><div class="flex items-center gap-2 ${s.c.replace('text-','bg-').replace('400','400/10')} ${s.c} rounded px-3 py-2 text-sm"><span>${s.l}</span></div>${m.location?`<div class="text-gray-400 text-sm mt-2">📍 ${m.location}</div>`:''}${m.notes?`<p class="text-gray-400 text-sm mt-2 italic">${m.notes}</p>`:''}</div>${t.overview?`<p class="text-gray-300 text-sm leading-relaxed mb-4">${t.overview}</p>`:''}</div></div></div></div></div>`;}}
      document.getElementById('app').innerHTML=html;
    }
    load();
  </script>
</body>
</html>
