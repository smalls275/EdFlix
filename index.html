<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdFlix - Family Movie Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'edflix-red': '#E50914',
            'edflix-dark': '#141414',
            'edflix-gray': '#181818',
            'edflix-light-gray': '#2F2F2F',
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    .movie-card { transition: transform 0.3s ease, z-index 0s; }
    .movie-card:hover { transform: scale(1.08); z-index: 20; }
    .hero-gradient {
      background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(20,20,20,0.6) 50%, rgba(20,20,20,1) 100%);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { animation: fadeIn 0.2s ease-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }
  </style>
</head>
<body class="bg-[#141414] text-white antialiased min-h-screen">
  <div id="app"></div>
  <script>
    const DATA = [
      {tmdbId:155,title:"The Dark Knight",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Steelbook edition",dateAdded:"2023-01-15",genre:["Action","Crime","Drama"],tags:["favorites","superhero"]},
      {tmdbId:680,title:"Pulp Fiction",formats:["Blu-ray","DVD"],location:"Living Room Shelf B",status:"available",dateAdded:"2022-06-20",genre:["Thriller","Crime"],tags:["classics"]},
      {tmdbId:238,title:"The Godfather",formats:["4K UHD","Blu-ray","DVD"],location:"Living Room Shelf A",status:"available",dateAdded:"2021-12-25",genre:["Drama","Crime"],tags:["classics","favorites"]},
      {tmdbId:550,title:"Fight Club",formats:["Blu-ray"],location:"Bedroom Shelf",status:"checked-out",checkedOutBy:"Dad",dateAdded:"2023-03-10",genre:["Drama"],tags:["cult-classics"]},
      {tmdbId:13,title:"Forrest Gump",formats:["DVD","VHS"],location:"Living Room Shelf B",status:"available",dateAdded:"2020-08-01",genre:["Comedy","Drama","Romance"],tags:["family-friendly","classics"]},
      {tmdbId:11,title:"Star Wars",formats:["4K UHD","Blu-ray","VHS"],location:"Living Room Shelf A",status:"available",dateAdded:"2019-05-04",genre:["Adventure","Action","Science Fiction"],tags:["favorites","sci-fi"]},
      {tmdbId:120,title:"The Lord of the Rings: The Fellowship of the Ring",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Extended Edition",dateAdded:"2022-01-10",genre:["Adventure","Fantasy","Action"],tags:["favorites","fantasy"]},
      {tmdbId:497,title:"The Green Mile",formats:["Blu-ray"],location:"Living Room Shelf B",status:"available",dateAdded:"2023-06-15",genre:["Fantasy","Drama","Crime"],tags:["classics"]},
      {tmdbId:157336,title:"Interstellar",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"lent-out",checkedOutBy:"Uncle Mike",dateAdded:"2023-09-01",genre:["Adventure","Drama","Science Fiction"],tags:["favorites","sci-fi"]},
      {tmdbId:278,title:"The Shawshank Redemption",formats:["Blu-ray","DVD"],location:"Living Room Shelf B",status:"available",dateAdded:"2021-03-20",genre:["Drama","Crime"],tags:["classics","favorites"]},
      {tmdbId:603,title:"The Matrix",formats:["4K UHD","DVD"],location:"Bedroom Shelf",status:"available",dateAdded:"2022-11-10",genre:["Action","Science Fiction"],tags:["sci-fi","cult-classics"]},
      {tmdbId:389,title:"12 Angry Men",formats:["DVD"],location:"Living Room Shelf B",status:"available",dateAdded:"2020-02-14",genre:["Drama"],tags:["classics"]},
      {tmdbId:24428,title:"The Avengers",formats:["Blu-ray","DVD"],location:"Kids Room",status:"available",dateAdded:"2022-07-04",genre:["Science Fiction","Action","Adventure"],tags:["family-friendly","superhero"]},
      {tmdbId:862,title:"Toy Story",formats:["Blu-ray","DVD","VHS"],location:"Kids Room",status:"available",dateAdded:"2019-11-22",genre:["Animation","Comedy","Family"],tags:["family-friendly","kids","animation"]},
      {tmdbId:150540,title:"Inside Out",formats:["Blu-ray"],location:"Kids Room",status:"checked-out",checkedOutBy:"Kids",dateAdded:"2023-04-20",genre:["Animation","Family","Comedy"],tags:["family-friendly","kids","animation"]},
      {tmdbId:122,title:"The Lord of the Rings: The Return of the King",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Extended Edition",dateAdded:"2022-01-10",genre:["Adventure","Fantasy","Action"],tags:["favorites","fantasy"]},
      {tmdbId:121,title:"The Lord of the Rings: The Two Towers",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",notes:"Extended Edition",dateAdded:"2022-01-10",genre:["Adventure","Fantasy","Action"],tags:["favorites","fantasy"]},
      {tmdbId:27205,title:"Inception",formats:["4K UHD","Blu-ray"],location:"Living Room Shelf A",status:"available",dateAdded:"2023-02-28",genre:["Action","Science Fiction","Adventure"],tags:["favorites","sci-fi"]},
      {tmdbId:807,title:"Se7en",formats:["Blu-ray"],location:"Bedroom Shelf",status:"available",dateAdded:"2023-10-31",genre:["Crime","Mystery","Thriller"],tags:["thriller"]},
      {tmdbId:105,title:"Back to the Future",formats:["4K UHD","Blu-ray","VHS"],location:"Living Room Shelf A",status:"available",dateAdded:"2020-10-21",genre:["Adventure","Comedy","Science Fiction"],tags:["family-friendly","classics","sci-fi"]}
    ];

    let KEY = 'dfdcfeaefeefe243e2761936a156b66c';
    const IMG = 'https://image.tmdb.org/t/p';
    let movies = [], search = '', filter = 'all', modalId = null;

    async function load() {
      if (!KEY) { movies = DATA.map(d => ({...d, tmdbData: null})); render(); return; }
      movies = await Promise.all(DATA.map(async d => {
        try {
          const r = await fetch(`https://api.themoviedb.org/3/movie/${d.tmdbId}?api_key=${KEY}&append_to_response=videos,credits`);
          return {...d, tmdbData: r.ok ? await r.json() : null};
        } catch { return {...d, tmdbData: null}; }
      }));
      render();
    }

    function filtered() {
      let r = movies;
      if (search.trim()) {
        const q = search.toLowerCase();
        r = r.filter(m => m.title.toLowerCase().includes(q) || m.genre?.some(g => g.toLowerCase().includes(q)) || m.tags?.some(t => t.toLowerCase().includes(q)) || m.location?.toLowerCase().includes(q) || m.checkedOutBy?.toLowerCase().includes(q) || m.formats.some(f => f.toLowerCase().includes(q)));
      }
      if (filter === 'available') r = r.filter(m => m.status === 'available');
      else if (filter === 'checked-out') r = r.filter(m => m.status !== 'available');
      else if (['4K UHD','Blu-ray','DVD','VHS'].includes(filter)) r = r.filter(m => m.formats.includes(filter));
      return r;
    }

    function cats(fr) {
      if (search.trim()) return [{title: `Search Results for "${search}"`, movies: fr}];
      const c = [];
      const ra = [...fr].sort((a,b) => (b.dateAdded || '').localeCompare(a.dateAdded || '')).slice(0,15);
      if (ra.length) c.push({title: 'Recently Added', movies: ra});
      const fav = fr.filter(m => m.tags?.includes('favorites'));
      if (fav.length) c.push({title: 'Family Favorites', movies: fav});
      const k = fr.filter(m => m.formats.includes('4K UHD'));
      if (k.length) c.push({title: '4K Ultra HD Collection', movies: k});
      const g = new Map();
      fr.forEach(m => m.genre?.forEach(h => { if (!g.has(h)) g.set(h, []); g.get(h).push(m); }));
      [...g.entries()].sort((a,b) => b[1].length - a[1].length).forEach(([t,m]) => { if (m.length >= 2) c.push({title: t, movies: m}); });
      const un = fr.filter(m => m.status !== 'available');
      if (un.length) c.push({title: 'Currently Checked Out', movies: un});
      const loc = new Map();
      fr.forEach(m => { if (m.location) { if (!loc.has(m.location)) loc.set(m.location, []); loc.get(m.location).push(m); } });
      loc.forEach((m,l) => { if (m.length >= 2) c.push({title: `📍 ${l}`, movies: m}); });
      return c;
    }

    function trailerUrl(tmdbData) {
      const videos = tmdbData?.videos?.results;
      if (!videos || !videos.length) return null;
      const trailer = videos.find(v => v.site === 'YouTube' && v.type === 'Trailer');
      if (trailer) return `https://www.youtube.com/embed/${trailer.key}`;
      const teaser = videos.find(v => v.site === 'YouTube' && v.type === 'Teaser');
      if (teaser) return `https://www.youtube.com/embed/${teaser.key}`;
      const any = videos.find(v => v.site === 'YouTube');
      if (any) return `https://www.youtube.com/embed/${any.key}`;
      return null;
    }

    function st(s, who) {
      const x = {available: {c:'text-green-400', l:'Available'}, 'checked-out': {c:'text-yellow-400', l:`With ${who||'?'}`}, 'lent-out': {c:'text-red-400', l:`Lent to ${who||'?'}`}};
      return x[s] || x.available;
    }

    function badge(f) {
      const m = {'4K UHD':'4K','Blu-ray':'BD','DVD':'DVD','VHS':'VHS','Steelbook':'STEEL','LaserDisc':'LD','HD DVD':'HD'};
      return `<span class="inline-block rounded font-bold uppercase tracking-wider text-[10px] px-1.5 py-0.5 bg-[#2F2F2F] border border-gray-600">${m[f]||f}</span>`;
    }

    function card(m) {
      const t = m.tmdbData || {};
      const y = (t.release_date || '').split('-')[0] || '';
      const r = t.vote_average ? t.vote_average.toFixed(1) : null;
      const s = st(m.status, m.checkedOutBy);
      const poster = t.poster_path ? `${IMG}/w500${t.poster_path}` : '';
      return `<button onclick="openModal(${m.tmdbId})" class="movie-card flex-shrink-0 w-[160px] md:w-[200px] group cursor-pointer text-left focus:outline-none focus:ring-2 focus:ring-[#E50914] rounded-md"><div class="relative rounded-md overflow-hidden bg-[#181818] aspect-[2/3]">${poster ? `<img src="${poster}" alt="${m.title}" class="w-full h-full object-cover" loading="lazy" />` : `<div class="w-full h-full flex items-center justify-center text-gray-500 text-sm px-2 text-center">${m.title}</div>`}${m.status !== 'available' ? `<div class="absolute top-2 right-2 bg-black/80 rounded-full p-1 text-xs ${s.c}">●</div>` : ''}<div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3"><div class="flex items-center gap-1.5 mb-1.5 flex-wrap">${m.formats.map(f => badge(f)).join('')}</div><p class="text-white text-xs font-semibold truncate">${m.title}</p><div class="flex items-center gap-2 text-[10px] text-gray-300 mt-0.5">${y ? `<span>${y}</span>` : ''}${r ? `<span class="text-yellow-400">★ ${r}</span>` : ''}</div><div class="flex items-center gap-1 mt-1 text-[10px] ${s.c}"><span>${s.l}</span></div>${m.location ? `<div class="text-[10px] text-gray-400 mt-0.5 truncate">📍 ${m.location}</div>` : ''}</div></div></button>`;
    }

    function row(c, i) {
      return `<div class="mb-8 group/row"><h2 class="text-lg md:text-xl font-bold text-white mb-3 px-4 md:px-12">${c.title}<span class="text-sm font-normal text-gray-400 ml-3">${c.movies.length} title${c.movies.length !== 1 ? 's' : ''}</span></h2><div class="relative"><button onclick="scrollR(${i},-1)" class="absolute left-0 top-0 bottom-0 z-20 w-10 md:w-12 bg-black/50 hover:bg-black/80 text-white opacity-0 group-hover/row:opacity-100 transition-opacity flex items-center justify-center" aria-label="Scroll left">‹</button><div id="r${i}" class="scroll-row flex gap-2 md:gap-3 overflow-x-auto px-4 md:px-12 pb-2" style="scrollbar-width:none">${c.movies.map(card).join('')}</div><button onclick="scrollR(${i},1)" class="absolute right-0 top-0 bottom-0 z-20 w-10 md:w-12 bg-black/50 hover:bg-black/80 text-white opacity-0 group-hover/row:opacity-100 transition-opacity flex items-center justify-center" aria-label="Scroll right">›</button></div></div>`;
    }

    function scrollR(i, d) {
      const e = document.getElementById('r' + i);
      if (e) e.scrollBy({left: d * e.clientWidth * 0.75, behavior: 'smooth'});
    }

    function openModal(id) { modalId = id; document.body.style.overflow = 'hidden'; render(); }
    function closeModal() { modalId = null; document.body.style.overflow = ''; render(); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalId) closeModal(); });

    function setKey() {
      const v = document.getElementById('keyInput').value.trim();
      if (v) { KEY = v; localStorage.setItem('tmdb_key', v); load(); }
    }

    function render() {
      const fr = filtered();
      const ca = cats(fr);
      let html = '';

      // Navbar
      html += `<nav class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-b from-black/90 to-transparent px-4 md:px-12 py-4 flex items-center justify-between"><div class="flex items-center gap-3"><svg class="w-8 h-8 text-[#E50914]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg><h1 class="text-2xl md:text-3xl font-bold text-[#E50914] tracking-tight">EdFlix</h1></div><div class="flex items-center gap-4"><div class="flex items-center bg-black/80 border border-white/30 rounded px-3 py-1.5"><svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input type="text" placeholder="Search titles, genres, tags..." value="${search.replace(/"/g,'&quot;')}" oninput="search=this.value;render();" class="bg-transparent text-white text-sm outline-none w-48 md:w-72 placeholder:text-gray-500"/><button onclick="search='';render();" class="ml-2 text-gray-400 hover:text-white">✕</button></div></div></nav>`;

      html += `<main class="min-h-screen bg-[#141414]">`;

      // Hero
      const hero = !search && fr.length > 0 ? fr[Math.floor(Math.random() * Math.min(fr.length, 5))] : null;
      if (hero && hero.tmdbData?.backdrop_path) {
        html += `<div class="relative h-[60vh] md:h-[70vh]"><img src="${IMG}/original${hero.tmdbData.backdrop_path}" alt="${hero.title}" class="w-full h-full object-cover" /><div class="hero-gradient absolute inset-0"></div><div class="absolute bottom-16 left-4 md:left-12 max-w-xl z-10"><h2 class="text-3xl md:text-5xl font-bold text-white mb-2 drop-shadow-lg">${hero.title}</h2><p class="text-sm text-gray-200 line-clamp-3 mb-3 drop-shadow">${hero.tmdbData.overview || ''}</p><div class="flex items-center gap-2 flex-wrap mb-3">${hero.formats.map(f => `<span class="text-xs bg-white/20 backdrop-blur-sm text-white px-2.5 py-1 rounded">${f}</span>`).join('')}</div><button onclick="openModal(${hero.tmdbId})" class="bg-white text-black font-semibold px-6 py-2.5 rounded hover:bg-gray-200 transition-colors text-sm">More Info</button></div></div>`;
      }

      // Stats bar
      html += `<div class="px-4 md:px-12 ${!search && hero ? '-mt-4' : 'pt-24'} pb-4 relative z-10"><div class="flex items-center justify-between flex-wrap gap-3"><div class="flex items-center gap-3 text-sm text-gray-400"><svg class="w-4 h-4 text-[#E50914]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span><strong class="text-white">${movies.length}</strong> titles in collection</span><span class="text-gray-600">|</span><span><strong class="text-green-400">${movies.filter(m => m.status === 'available').length}</strong> available</span></div><div class="flex items-center gap-2 flex-wrap"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>${[['All','all'],['Available','available'],['Checked Out','checked-out'],['4K UHD','4K UHD'],['Blu-ray','Blu-ray'],['DVD','DVD'],['VHS','VHS']].map(([l,v]) => `<button onclick="filter='${v}';render();" class="text-xs px-3 py-1.5 rounded-full transition-colors ${filter === v ? 'bg-white text-black font-semibold' : 'bg-[#2F2F2F] text-gray-300 hover:bg-gray-600'}">${l}</button>`).join('')}</div></div></div>`;

      // API key banner
      if (!KEY && movies.length > 0) {
        html += `<div class="mx-4 md:mx-12 mb-6 bg-yellow-900/30 border border-yellow-700 rounded-lg p-4"><p class="text-yellow-300 text-sm font-semibold mb-1">TMDB API Key Missing</p><p class="text-yellow-200/70 text-sm mb-2">Enter your TMDB API key below to load posters, backdrops, and movie details. Get a free key at <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener noreferrer" class="underline text-yellow-300 hover:text-yellow-100">themoviedb.org</a></p><div class="flex gap-2"><input id="keyInput" type="text" placeholder="Paste TMDB API key..." class="bg-black/50 border border-yellow-700/50 rounded px-3 py-1.5 text-sm text-white outline-none w-64" /><button onclick="setKey()" class="bg-yellow-700 hover:bg-yellow-600 text-white text-xs font-semibold px-3 py-1.5 rounded transition-colors">Load Posters</button></div></div>`;
      }

      // No results
      if (fr.length === 0) html += `<div class="flex items-center justify-center py-24 text-center"><p class="text-gray-400 text-lg mb-2">No movies found</p><p class="text-gray-600 text-sm">Try a different search or filter</p></div>`;
      else html += `<div class="pb-12">${ca.map(row).join('')}</div>`;

      html += `</main>`;

      // Modal
      if (modalId) {
        const m = movies.find(x => x.tmdbId === modalId);
        if (m) {
          const t = m.tmdbData || {};
          const y = (t.release_date || '').split('-')[0] || '';
          const r = t.vote_average ? t.vote_average.toFixed(1) : null;
          const s = st(m.status, m.checkedOutBy);
          html += `<div class="modal-overlay fixed inset-0 z-[100] bg-black/80 flex items-start justify-center overflow-y-auto py-8 px-4" onclick="if(event.target===event.currentTarget)closeModal()"><div class="modal-content relative bg-[#181818] rounded-lg overflow-hidden max-w-3xl w-full shadow-2xl"><button onclick="closeModal()" class="absolute top-4 right-4 z-30 bg-[#141414]/80 hover:bg-[#141414] rounded-full p-2 text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>${(() => { const tr = trailerUrl(t); const ytKey = t?.videos?.results?.find(v => v.site === 'YouTube')?.key; return `<div class="relative aspect-video bg-black">${tr ? `<iframe src="${tr}?autoplay=1&mute=1&rel=0&modestbranding=1" title="Trailer" class="w-full h-full" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : t.backdrop_path ? `<img src="${IMG}/w1280${t.backdrop_path}" alt="${m.title}" class="w-full h-full object-cover" />` : '<div class="w-full h-full flex items-center justify-center text-gray-500">No trailer available</div>'}${ytKey ? `<a href="https://www.youtube.com/watch?v=${ytKey}" target="_blank" rel="noopener noreferrer" class="absolute bottom-4 left-4 bg-[#E50914] hover:bg-[#b20710] text-white px-4 py-2 rounded font-semibold text-sm flex items-center gap-2 transition-colors z-20"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>Watch on YouTube</a>` : ''}<div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-[#181818] to-transparent"></div></div>`; })()}<div class="px-6 md:px-10 pb-8 -mt-8 relative z-10"><div class="flex gap-6"><div class="hidden md:block flex-shrink-0 w-36 -mt-24 relative z-20">${t.poster_path ? `<img src="${IMG}/w500${t.poster_path}" alt="${m.title}" class="w-full rounded-lg shadow-xl" />` : '<div class="w-full aspect-[2/3] bg-[#2F2F2F] rounded-lg flex items-center justify-center text-gray-500 text-sm">No poster</div>'}</div><div class="flex-1 min-w-0"><h2 class="text-2xl md:text-3xl font-bold text-white mb-1">${m.title}</h2>${t.tagline ? `<p class="text-gray-400 italic text-sm mb-3">&ldquo;${t.tagline}&rdquo;</p>` : ''}<div class="flex flex-wrap items-center gap-3 text-sm text-gray-300 mb-4">${y ? `<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${y}</span>` : ''}${r ? `<span class="flex items-center gap-1 text-yellow-400"><svg class="w-3.5 h-3.5 fill-yellow-400" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${r}</span>` : ''}${t.runtime ? `<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${Math.floor(t.runtime/60)}h ${t.runtime%60}m</span>` : ''}</div><div class="bg-[#141414] rounded-lg p-4 mb-4"><div class="flex items-center gap-2 mb-3"><svg class="w-4 h-4 text-[#E50914]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="text-sm font-semibold text-white">Physical Media</span></div><div class="flex flex-wrap gap-2 mb-3">${m.formats.map(badge).join('')}</div><div class="flex items-center gap-2 ${s.c.replace('text-','bg-').replace('400','400/10')} ${s.c} rounded px-3 py-2 text-sm"><span>${s.l}</span></div>${m.location ? `<div class="text-gray-400 text-sm mt-2">📍 ${m.location}</div>` : ''}${m.notes ? `<p class="text-gray-400 text-sm mt-2 italic">${m.notes}</p>` : ''}</div>${t.overview ? `<p class="text-gray-300 text-sm leading-relaxed mb-4">${t.overview}</p>` : ''}${(() => { const director = t.credits?.crew?.find(c => c.job === 'Director'); return director ? `<p class="text-sm text-gray-400 mb-2"><span class="text-gray-500">Directed by</span> <span class="text-white">${director.name}</span></p>` : ''; })()}${t.genres?.length ? `<div class="flex flex-wrap gap-2 mb-4">${t.genres.map(g => `<span class="text-xs bg-[#2F2F2F] text-gray-300 px-2.5 py-1 rounded-full">${g.name}</span>`).join('')}</div>` : ''}${(() => { const cast = t.credits?.cast?.slice(0, 8) || []; return cast.length ? `<div class="mb-2"><p class="text-sm text-gray-500 mb-1">Cast</p><div class="flex flex-wrap gap-x-3 gap-y-1 text-sm">${cast.map(c => `<span class="text-gray-300">${c.name}<span class="text-gray-600 ml-1 text-xs">as ${c.character}</span></span>`).join('')}</div></div>` : ''; })()}</div></div></div></div></div>`;
        }
      }

      document.getElementById('app').innerHTML = html;
    }

    load();
  </script>
