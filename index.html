  <link rel="stylesheet" href="tailwind.css">
  <style>
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    .scroll-row { scrollbar-width: none; }
    .scroll-row::-webkit-scrollbar { display: none; }

    .movie-card { transition: transform 0.2s ease, box-shadow 0.2s ease, z-index 0s; }
    .movie-card:hover { transform: scale(1.08); z-index: 20; }
    /* Show overlay + scale on keyboard/D-pad focus (Fire TV remote) */
    .movie-card:focus { outline: none; transform: scale(1.08); z-index: 20; box-shadow: 0 0 0 3px #E50914, 0 12px 28px rgba(0,0,0,0.6); }
    .movie-card:focus .group-hover\:opacity-100,
    .movie-card:focus-within .group-hover\:opacity-100 { opacity: 1; }
    /* Reveal row arrows when any descendant has focus, not just on hover */
    .group\/row:focus-within .opacity-0 { opacity: 1; }

    .hero-gradient {
      background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(20,20,20,0.6) 50%, rgba(20,20,20,1) 100%);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { animation: fadeIn 0.2s ease-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      .movie-card:hover { transform: none; }
      .movie-card { transform: none; }
      .movie-card .absolute.inset-0 { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%); }
      .movie-card .absolute.inset-0 .flex { justify-content: flex-start; padding: 8px; }
      .movie-card .absolute.inset-0 .flex .text-xs { display: block; }
      .movie-card .absolute.inset-0 .flex .text-xs.font-semibold { font-size: 11px; margin-bottom: 2px; }
      .modal-content { max-height: 90vh; overflow-y: auto; }
    }
  </style>
</head>

    let KEY = 'dfdcfeaefeefe243e2761936a156b66c';

    // Deduplicate DATA by (tmdbId,type) so accidental dupes don't render twice
    const SEEN_DATA = new Set();
    const UNIQUE_DATA = DATA.filter(d => {
      const k = `${d.type || 'movie'}:${d.tmdbId}`;
      if (SEEN_DATA.has(k)) return false;

    // Coalesce render() calls so background fetches don't cause a re-render storm
    let _renderQueued = false;
    function scheduleRender() {
      if (_renderQueued) return;
      _renderQueued = true;
      requestAnimationFrame(() => { _renderQueued = false; render(); });
    }

    // Limit-concurrency map to avoid TMDB 429s
    async function pMap(items, limit, fn) {
      const out = new Array(items.length);
      let i = 0;
      const workers = Array.from({length: Math.min(limit, items.length)}, async () => {
        while (true) {
          const idx = i++;
          if (idx >= items.length) return;
          out[idx] = await fn(items[idx], idx);
        }
      });
      await Promise.all(workers);
      return out;
    }

    // Hero Carousel: slowly iterates through all movies with backdrops (Fire TV / leanback friendly).
    // Only re-renders the hero element, not the whole app, so focus/search state is preserved.
    function rotateHero() {
      // Skip rotation while user is searching or modal is open
      if (search || modalId) return;
      const candidates = movies.filter(m => m.tmdbData?.backdrop_path);
      if (candidates.length === 0) return;
      heroIndex = (heroIndex + 1) % candidates.length;
      heroPick = candidates[heroIndex];
      renderHero();
    }

    function startHeroCarousel() {
      if (heroTimer) clearInterval(heroTimer);
      const candidates = movies.filter(m => m.tmdbData?.backdrop_path);
      if (candidates.length > 0) {
        heroIndex = Math.floor(Math.random() * candidates.length);
        heroPick = candidates[heroIndex];
      }
      heroTimer = setInterval(rotateHero, 15000); // cycle every 15 seconds
    }

    async function load() {
      if (!KEY) { movies = UNIQUE_DATA.map(d => ({...d, tmdbData: null})); render(); return; }
      // Show cards immediately with no metadata, then progressively enrich
      movies = UNIQUE_DATA.map(d => ({...d, tmdbData: null}));
      render();
      const fetchOne = async d => {
        try {
          const isTV = d.type === 'tv' || d.notes?.includes('TV Series');
          const endpoint = isTV ? 'tv' : 'movie';
          const r = await fetch(`https://api.themoviedb.org/3/${endpoint}/${d.tmdbId}?api_key=${KEY}&append_to_response=videos,credits`);
          if (!r.ok) return {...d, tmdbData: null};
          const data = await r.json();
          if (isTV) {
            data.title = data.title || data.name;
            data.release_date = data.release_date || data.first_air_date;
          }
          return {...d, tmdbData: data, isTV};
        } catch { return {...d, tmdbData: null}; }
      };
      movies = await pMap(UNIQUE_DATA, 8, fetchOne);
      startHeroCarousel();
      render();
      loadUpcoming();
    }

    async function loadUpcoming() {
      if (!KEY) return;
      try {
        const now = new Date();
        const today = now.toISOString().slice(0, 10);
        // Window starts 60 days ago so films still in their US theatrical run are included
        const windowStart = new Date(now); windowStart.setDate(windowStart.getDate() - 60);
        const windowStartStr = windowStart.toISOString().slice(0, 10);
        const windowEnd = new Date(now); windowEnd.setMonth(windowEnd.getMonth() + 18);
        const windowEndStr = windowEnd.toISOString().slice(0, 10);

        // Pull from multiple sources / sort orders so we don't miss less-popular or far-out films
        const sources = [
          `https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&region=US&with_release_type=2|3&release_date.gte=${windowStartStr}&release_date.lte=${windowEndStr}&sort_by=popularity.desc`,
          `https://api.themoviedb.org/3/movie/upcoming?api_key=${KEY}&region=US`,
          `https://api.themoviedb.org/3/movie/now_playing?api_key=${KEY}&region=US`
        ];
        const PAGE_CAP = 5; // ~100 results per source

        const fetchAllPages = async (base) => {
          const first = await fetch(`${base}&page=1`).then(r => r.ok ? r.json() : { results: [], total_pages: 0 }).catch(() => ({ results: [], total_pages: 0 }));
          const maxPage = Math.min(first.total_pages || 1, PAGE_CAP);
          if (maxPage <= 1) return first.results || [];
          const rest = await Promise.all(
            Array.from({ length: maxPage - 1 }, (_, i) => i + 2).map(p =>
              fetch(`${base}&page=${p}`).then(r => r.ok ? r.json() : { results: [] }).catch(() => ({ results: [] }))
            )
          );
          return [first, ...rest].flatMap(p => p.results || []);
        };

        const allResults = (await Promise.all(sources.map(fetchAllPages))).flat();
        const seen = new Set();
        const candidates = allResults
          .filter(m => m && m.id && !seen.has(m.id) && (seen.add(m.id), true))
          .slice(0, 80); // cap to keep detail fetches reasonable on low-power devices

        // Process detail fetches in batches to avoid hitting TMDB's rate limit
        const batchSize = 15;
        const detailed = [];
        for (let i = 0; i < candidates.length; i += batchSize) {
          const batch = candidates.slice(i, i + batchSize);
          const results = await Promise.all(batch.map(async m => {
            try {
              const [detailRes, datesRes] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/movie/${m.id}?api_key=${KEY}&append_to_response=videos,credits`),
                fetch(`https://api.themoviedb.org/3/movie/${m.id}/release_dates?api_key=${KEY}`)
              ]);
              if (!detailRes.ok) return null;
              const d = await detailRes.json();
              // Find US release date (prefer theatrical/limited, then premiere/digital as fallback)
              let usReleaseDate = null;
              if (datesRes.ok) {
                const dj = await datesRes.json();
                const usEntry = (dj.results || []).find(r => r.iso_3166_1 === 'US');
                if (usEntry) {
                  const rels = (usEntry.release_dates || []).slice().sort((a,b) => a.release_date.localeCompare(b.release_date));
                  const theatrical = rels.find(r => r.type === 3) || rels.find(r => r.type === 2);
                  const any = rels[0];
                  const chosen = theatrical || any;
                  if (chosen) usReleaseDate = chosen.release_date.slice(0, 10);
                }
              }
              // Fallback: if no US release entry yet, accept the movie's primary release_date if its production includes the US
              if (!usReleaseDate && d.release_date) {
                const usProduced = (d.production_countries || []).some(c => c.iso_3166_1 === 'US') ||
                                   (d.origin_country || []).includes('US');
                if (usProduced) usReleaseDate = d.release_date;
              }
              // Require a release in our window (includes films currently in theaters)
              if (!usReleaseDate || usReleaseDate < windowStartStr || usReleaseDate > windowEndStr) return null;
              // Require a trailer to exist (already released to the public)
              const hasTrailer = (d.videos?.results || []).some(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));
              if (!hasTrailer) return null;
              d.release_date = usReleaseDate;
              return { tmdbId: m.id, title: d.title, formats: [], status: 'upcoming', genre: (d.genres || []).map(g => g.name), tmdbData: d, isUpcoming: true };
            } catch { return null; }
          }));
          detailed.push(...results.filter(Boolean));
          // Progressive render (coalesced) so the row fills in without a re-render storm
          upcoming = [...detailed].sort((a, b) => (a.tmdbData.release_date || '').localeCompare(b.tmdbData.release_date || ''));
          scheduleRender();
        }
      } catch {}
    }

    function filtered() {
      let r = movies;
      if (search.trim()) {
        const q = search.toLowerCase();
        r = r.filter(m => m.title.toLowerCase().includes(q) || m.genre?.some(g => g.toLowerCase().includes(q)) || m.tags?.some(t => t.toLowerCase().includes(q)) || m.location?.toLowerCase().includes(q) || m.checkedOutBy?.toLowerCase().includes(q) || m.formats.some(f => f.toLowerCase().includes(q)));
      }
      if (filter === 'available') r = r.filter(m => m.status === 'available');
      else if (filter === 'checked-out') r = r.filter(m => m.status !== 'available');
      else if (['4K UHD','Blu-ray','DVD','VHS','3D Blu-ray'].includes(filter)) r = r.filter(m => m.formats.includes(filter));
      return r;
    }

    function cats(fr) {
      if (search.trim()) return [{title: `Search Results for "${search}"`, movies: fr}];
      const c = [];
      if (upcoming.length && filter === 'all') c.push({title: '🎬 In Theaters & Coming Soon', movies: upcoming});
      const fav = fr.filter(m => m.tags?.includes('favorites'));
      if (fav.length) c.push({title: 'Family Favorites', movies: fav});
      const threeD = fr.filter(m => m.formats.includes('3D Blu-ray'));
      if (threeD.length) c.push({title: '3D Movies', movies: threeD});
      const tv = fr.filter(m => m.type === 'tv' || m.notes?.includes('TV Series'));
      if (tv.length) c.push({title: 'TV Series', movies: tv});
      const g = new Map();
      fr.forEach(m => m.genre?.forEach(h => { if (!g.has(h)) g.set(h, []); g.get(h).push(m); }));
      [...g.entries()].sort((a,b) => b[1].length - a[1].length).forEach(([t,m]) => { if (m.length >= 2) c.push({title: t, movies: m}); });
      const un = fr.filter(m => m.status !== 'available');
      if (un.length) c.push({title: 'Currently Checked Out', movies: un});

      // Fun bonus categories
      const yearOf = m => parseInt((m.tmdbData?.release_date || '').slice(0,4)) || 0;
      const runtimeOf = m => m.tmdbData?.runtime || 0;
      const ratingOf = m => m.tmdbData?.vote_average || 0;

      const push = (title, movies, min = 3) => { if (movies.length >= min) c.push({title, movies}); };

      push('🏆 4K Crown Jewels', fr.filter(m => m.formats.includes('4K UHD') && ratingOf(m) >= 8));
      push('🎞️ Criterion Classics (Pre-1980)', fr.filter(m => { const y = yearOf(m); return y > 0 && y < 1980; }));
      push('📼 The \'80s', fr.filter(m => { const y = yearOf(m); return y >= 1980 && y < 1990; }));
      push('💿 The \'90s', fr.filter(m => { const y = yearOf(m); return y >= 1990 && y < 2000; }));
      push('📀 The 2000s', fr.filter(m => { const y = yearOf(m); return y >= 2000 && y < 2010; }));
      push('🆕 Fresh This Decade (2020s)', fr.filter(m => yearOf(m) >= 2020));
      push('🌙 Late Night Horror', fr.filter(m => m.genre?.some(g => /horror/i.test(g))));
      push('🍿 Popcorn Comedies', fr.filter(m => m.genre?.some(g => /comedy/i.test(g))));
      push('🚀 Sci-Fi Deep Space', fr.filter(m => m.genre?.some(g => /sci.?fi|science fiction/i.test(g))));
      push('⭐ Critically Acclaimed (8.0+)', fr.filter(m => ratingOf(m) >= 8).sort((a,b) => ratingOf(b) - ratingOf(a)));
      push('⏳ Epic Runtimes (2.5hr+)', fr.filter(m => runtimeOf(m) >= 150));
      push('⚡ Tight 88', fr.filter(m => runtimeOf(m) > 0 && runtimeOf(m) <= 95));
      push('💎 Hidden Gems (High-rated, Few Votes)', fr.filter(m => ratingOf(m) >= 7.5 && (m.tmdbData?.vote_count || 0) < 1000));
      push('📺 Dusty DVD Shelf', fr.filter(m => m.formats.includes('DVD') && !m.formats.includes('4K UHD') && !m.formats.includes('Blu-ray')));
      push('👪 Family Movie Night', fr.filter(m => m.genre?.some(g => /family|animation/i.test(g))));

      // Drive-In Double Feature: curated by tag, boosted by Spielbergian blockbuster traits
      const driveInScore = m => {
        let s = 0;
        if (m.tags?.includes('drive-in')) s += 100;
        const y = yearOf(m);
        if (y >= 1975 && y < 2000) s += 20;
        const gs = (m.genre || []).join(' ').toLowerCase();
        if (/adventure/.test(gs)) s += 10;
        if (/action|thriller/.test(gs)) s += 6;
        if (/family|sci.?fi|science fiction/.test(gs)) s += 5;
        if (/horror|drama|western/.test(gs)) s += 3;
        if (runtimeOf(m) >= 100 && runtimeOf(m) <= 150) s += 4;
        if (ratingOf(m) >= 7) s += 4;
        return s;
      };
      const driveIn = fr.filter(m => driveInScore(m) >= 10).sort((a,b) => driveInScore(b) - driveInScore(a)).slice(0, 20);
      push('🚗 Drive-In Double Feature', driveIn);

      return c;
    }

    function trailerUrl(tmdbData) {
      const videos = tmdbData?.videos?.results;

      if (trailer) return `https://www.youtube.com/embed/${trailer.key}`;

      const any = videos.find(v => v.site === 'YouTube');
      if (any) return `https://www.youtube.com/embed/${any.key}`;

    function card(m) {

          modalHtml = `<div class="modal-overlay fixed inset-0 z-[100] bg-black/80 flex items-start justify-center overflow-y-auto py-8 px-4" onclick="if(event.target===event.currentTarget)closeModal()"><div class="modal-content relative bg-[#181818] rounded-lg overflow-hidden max-w-3xl w-full shadow-2xl"><button onclick="toggleFullscreen()" title="Fullscreen (F)" class="absolute top-4 right-16 z-30 bg-[#141414]/80 hover:bg-[#141414] focus:bg-[#E50914] rounded-full p-2 text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4h4M16 4h4v4M4 16v4h4M16 20h4v-4"/></svg></button><button onclick="closeModal()" title="Close (Esc)" class="absolute top-4 right-4 z-30 bg-[#141414]/80 hover:bg-[#141414] focus:bg-[#E50914] rounded-full p-2 text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>${(() => { const tr = trailerUrl(t); return `<div class="relative aspect-video bg-black">${tr ? `<iframe src="${tr}?autoplay=1&rel=0&modestbranding=1" title="Trailer" class="w-full h-full" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>` : t.backdrop_path ? `<img src="${IMG}/w1280${t.backdrop_path}" alt="${m.title}" class="w-full h-full object-cover" />` : '<div class="w-full h-full flex items-center justify-center text-gray-500">No trailer available</div>'}<div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-[#181818] to-transparent"></div></div>`; })()}<div class="px-6 md:px-10 pb-8 -mt-8 relative z-10"><div class="flex gap-6"><div class="hidden md:block flex-shrink-0 w-36 -mt-24 relative z-20">${t.poster_path ? `<img src="${IMG}/w500${t.poster_path}" alt="${m.title}" class="w-full rounded-lg shadow-xl" />` : '<div class="w-full aspect-[2/3] bg-[#2F2F2F] rounded-lg flex items-center justify-center text-gray-500 text-sm">No poster</div>'}</div><div class="flex-1 min-w-0"><h2 class="text-2xl md:text-3xl font-bold text-white mb-1">${m.title}</h2>${t.tagline ? `<p class="text-gray-400 italic text-sm mb-3">&ldquo;${t.tagline}&rdquo;</p>` : ''}<div class="flex flex-wrap items-center gap-3 text-sm text-gray-300 mb-4">${y ? `<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${y}</span>` : ''}${r ? `<span class="flex items-center gap-1 text-yellow-400"><svg class="w-3.5 h-3.5 fill-yellow-400" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${r}</span>` : ''}${t.runtime ? `<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${Math.floor(t.runtime/60)}h ${t.runtime%60}m</span>` : ''}</div>${m.isUpcoming ? `<div class="bg-[#141414] rounded-lg p-4 mb-4"><div class="flex items-center gap-2 bg-[#E50914]/10 text-[#E50914] rounded px-3 py-2 text-sm font-semibold"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>${t.release_date ? `In Theaters ${new Date(t.release_date + 'T00:00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}` : 'Coming Soon'}</span></div></div>` : `<div class="bg-[#141414] rounded-lg p-4 mb-4"><div class="flex flex-wrap gap-2 mb-3">${m.formats.map(badge).join('')}</div><div class="flex items-center gap-2 ${s.c.replace('text-','bg-').replace('400','400/10')} ${s.c} rounded px-3 py-2 text-sm"><span>${s.l}</span></div>${m.location ? `<div class="text-gray-400 text-sm mt-2">📍 ${m.location}</div>` : ''}${m.notes ? `<p class="text-gray-400 text-sm mt-2 italic">${m.notes}</p>` : ''}</div>`}${t.overview ? `<p class="text-gray-300 text-sm leading-relaxed mb-4">${t.overview}</p>` : ''}${(() => { const director = t.credits?.crew?.find(c => c.job === 'Director'); return director ? `<p class="text-sm text-gray-400 mb-2"><span class="text-gray-500">Directed by</span> <span class="text-white">${director.name}</span></p>` : ''; })()}${t.genres?.length ? `<div class="flex flex-wrap gap-2 mb-4">${t.genres.map(g => `<span class="text-xs bg-[#2F2F2F] text-gray-300 px-2.5 py-1 rounded-full">${g.name}</span>`).join('')}</div>` : ''}${(() => { const cast = t.credits?.cast?.slice(0, 8) || []; return cast.length ? `<div class="mb-2"><p class="text-sm text-gray-500 mb-1">Cast</p><div class="flex flex-wrap gap-x-3 gap-y-1 text-sm">${cast.map(c => `<span class="text-gray-300">${c.name}<span class="text-gray-600 ml-1 text-xs">as ${c.character}</span></span>`).join('')}</div></div>` : ''; })()}</div></div></div></div></div>`;
        }
      }

      const root = document.getElementById('modal-root');
      if (root) root.innerHTML = modalHtml;
    }

    load();
  </script>
</body>
</html>
