<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdFlix - Family Movie Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'edflix-red': '#E50914',
            'edflix-dark': '#141414',
            'edflix-gray': '#181818',
            'edflix-light-gray': '#2F2F2F',
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    .movie-card { transition: transform 0.3s ease, z-index 0s; }
    .movie-card:hover { transform: scale(1.08); z-index: 20; }
    .hero-gradient {
      background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(20,20,20,0.6) 50%, rgba(20,20,20,1) 100%);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { animation: fadeIn 0.2s ease-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }
    
    /* Mobile-specific styles */
    @media (max-width: 768px) {
      .movie-card:hover { transform: none; }
      .movie-card { transform: none; }
      .movie-card .absolute.inset-0 { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%); }
      .movie-card .absolute.inset-0 .flex { justify-content: flex-start; padding: 8px; }
      .movie-card .absolute.inset-0 .flex .text-xs { display: block; }
      .movie-card .absolute.inset-0 .flex .text-xs.font-semibold { font-size: 11px; margin-bottom: 2px; }
      .enter-box { width: 250px; height: 120px; font-size: 2rem; }
      .enter-hint { font-size: 0.8rem; bottom: 15%; }
      .loading-logo { font-size: 4rem; top: 30%; }
      .feature-presentation { font-size: 1rem; top: 50%; }
      .countdown-circle { width: 60px; height: 60px; font-size: 1.5rem; border-width: 4px; }
      .modal-content { max-height: 90vh; overflow-y: auto; }
      #theater-canvas { display: none; }
      .curtain { display: none; }
      .projector-beam { display: none; }
      .spotlight { display: none; }
      .screen-glow { display: none; }
      .vignette { display: none; }
      .film-grain { display: none; }
    }
    
    /* Click to enter screen */
    #enter-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .enter-box {
      width: 400px;
      height: 200px;
      background: #E50914;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.3em;
      box-shadow: 0 0 60px rgba(229,9,20,0.8), 0 0 120px rgba(229,9,20,0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .enter-box:hover {
      transform: scale(1.05);
      box-shadow: 0 0 80px rgba(229,9,20,1), 0 0 150px rgba(229,9,20,0.7);
    }
    .enter-hint {
      position: absolute;
      bottom: 20%;
      color: #666;
      font-size: 1rem;
      letter-spacing: 0.2em;
    }
    
    /* Movie theater lighting animation */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #theater-canvas {
      position: absolute;
      inset: 0;
    }
    .curtain {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      background: linear-gradient(to right, #8B0000 0%, #4a0000 100%);
      z-index: 5;
      transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .curtain-left {
      left: 0;
      background: linear-gradient(to right, #8B0000 0%, #4a0000 100%);
      transform: translateX(0);
    }
    .curtain-right {
      right: 0;
      background: linear-gradient(to left, #8B0000 0%, #4a0000 100%);
      transform: translateX(0);
    }
    .curtain.open-left {
      transform: translateX(-100%);
    }
    .curtain.open-right {
      transform: translateX(100%);
    }
    .curtain-pattern {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 20px,
        rgba(0,0,0,0.3) 20px,
        rgba(0,0,0,0.3) 40px
      );
    }
    @keyframes logoFadeIn {
      0% { opacity: 0; transform: scale(3); filter: blur(20px); }
      50% { opacity: 0.5; transform: scale(1.5); filter: blur(10px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    @keyframes logoFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes spotlight {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes countdown {
      0% { opacity: 0; transform: scale(2); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.5); }
    }
    @keyframes featurePresentation {
      0% { opacity: 0; transform: translateY(30px); letter-spacing: 0.5em; }
      100% { opacity: 1; transform: translateY(0); letter-spacing: 0.3em; }
    }
    @keyframes projectorBeam {
      0% { opacity: 0; transform: scaleX(0); }
      100% { opacity: 0.3; transform: scaleX(1); }
    }
    @keyframes filmGrain {
      0%, 100% { opacity: 0.03; }
      50% { opacity: 0.05; }
    }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-2px, -1px) rotate(-1deg); }
      20% { transform: translate(2px, 2px) rotate(1deg); }
      30% { transform: translate(-1px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-2px, 1px) rotate(-1deg); }
      60% { transform: translate(2px, -2px) rotate(0deg); }
      70% { transform: translate(-1px, -1px) rotate(1deg); }
      80% { transform: translate(1px, 2px) rotate(-1deg); }
      90% { transform: translate(-2px, -2px) rotate(0deg); }
    }
    @keyframes colorShift {
      0%, 100% { filter: hue-rotate(0deg) saturate(1); }
      33% { filter: hue-rotate(10deg) saturate(1.2); }
      66% { filter: hue-rotate(-10deg) saturate(0.8); }
    }
    @keyframes scratches {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.6; }
    }
    .loading-logo {
      position: absolute;
      z-index: 10;
      font-size: 9rem;
      font-weight: 900;
      color: #E50914;
      letter-spacing: 0.3em;
      text-shadow: 
        0 0 150px rgba(229,9,20,1), 
        0 0 250px rgba(229,9,20,0.8), 
        0 0 350px rgba(229,9,20,0.5),
        2px 0 0 rgba(0,0,0,0.3),
        -2px 0 0 rgba(255,255,255,0.1);
      opacity: 0;
      animation: 
        logoFadeIn 2s cubic-bezier(0.4, 0, 0.2, 1) 8.5s forwards,
        shake 0.25s linear infinite 8.5s,
        colorShift 3s ease-in-out infinite 8.5s,
        scratches 0.8s steps(10) infinite 8.5s;
      top: 35%;
    }
    .feature-presentation {
      position: absolute;
      z-index: 12;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      opacity: 0;
      animation: featurePresentation 1.5s ease-out forwards;
      top: 55%;
    }
    .spotlight {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      animation: spotlight 2.5s ease-out 5.3s forwards;
      pointer-events: none;
      z-index: 2;
    }
    .countdown-circle {
      position: absolute;
      z-index: 15;
      width: 120px;
      height: 120px;
      border: 8px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      opacity: 0;
      animation: countdown 1s ease-out forwards;
      background: #000;
    }
    .countdown-circle::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #333;
      border-radius: 50%;
      transform: rotate(-45deg);
    }
    .countdown-circle::after {
      content: '';
      position: absolute;
      width: 80%;
      height: 80%;
      border: 1px solid #444;
      border-radius: 50%;
    }
    .feature-presentation {
      position: absolute;
      z-index: 12;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      opacity: 0;
      animation: featurePresentation 1.5s ease-out forwards;
    }
    .projector-beam {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 100%;
      background: linear-gradient(to bottom, rgba(255,255,200,0.15) 0%, transparent 100%);
      clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
      opacity: 0;
      animation: projectorBeam 2s ease-out 1s forwards;
      pointer-events: none;
      z-index: 3;
    }
    .film-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }
    .film-grain canvas {
      width: 100%;
      height: 100%;
    }
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 4;
    }
    .screen-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.08) 0%, transparent 50%);
      opacity: 0;
      z-index: 1;
      animation: spotlight 3s ease-out 6.4s forwards;
    }
    .loading-screen.fade-out {
      animation: logoFadeOut 1.5s ease-out forwards;
    }
  </style>
</head>

  <script>
    // Click to enter screen
    const enterScreen = document.getElementById('enter-screen');
    const loadingScreen = document.getElementById('loading-screen');
    
    // Handle click to enter
    enterScreen.addEventListener('click', () => {
      enterScreen.style.display = 'none';
      loadingScreen.style.display = 'flex';
      startLoadingAnimation();
    });
    
    function startLoadingAnimation() {
      const canvas = document.getElementById('theater-canvas');
      const ctx = canvas.getContext('2d');
      const curtainLeft = document.querySelector('.curtain-left');
      const curtainRight = document.querySelector('.curtain-right');
      const countdownCircle = document.getElementById('countdown-circle');
      const featurePresentation = document.getElementById('feature-presentation');
      const filmGrain = document.querySelector('.film-grain');
      const grainCanvas = document.getElementById('grain-canvas');
      const hiddenYoutube = document.getElementById('hidden-youtube');
      
      let lights = [];
      let dustParticles = [];
      let animationFrame;
      let grainAnimationFrame;
      let startTime = Date.now();
      
      // Dynamic film grain
      function initGrain() {
        grainCanvas.width = window.innerWidth;
        grainCanvas.height = window.innerHeight;
      }
      
      function animateGrain() {
        const grainCtx = grainCanvas.getContext('2d');
        const imageData = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
        const data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const noise = Math.random() * 50;
          data[i] = noise;
          data[i + 1] = noise;
          data[i + 2] = noise;
          data[i + 3] = 30 + Math.random() * 20;
        }
        
        grainCtx.putImageData(imageData, 0, 0);
        grainAnimationFrame = requestAnimationFrame(animateGrain);
      }
      
      function showFilmGrain() {
        setTimeout(() => {
          filmGrain.style.opacity = '1';
          initGrain();
          animateGrain();
        }, 5000);
      }
      
      // YouTube video ID for theater sound
      const YOUTUBE_VIDEO_ID = '8HEL4YHdj68';
      
      function playHiddenYoutube() {
        hiddenYoutube.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=1&enablejsapi=1&controls=0&loop=0&playlist=${YOUTUBE_VIDEO_ID}`;
      }
      
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initLights();
        initDustParticles();
      }
      
      function initLights() {
        lights = [];
        const rows = 14;
        const lightsPerRow = 18;
        const spacingX = canvas.width / (lightsPerRow + 1);
        const spacingY = canvas.height / (rows + 1);
        
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < lightsPerRow; col++) {
            lights.push({
              x: spacingX * (col + 1),
              y: spacingY * (row + 1),
              size: 5,
              row: row,
              col: col,
              brightness: 0,
              targetBrightness: 1,
              turnOnTime: (rows - row) * 120 + Math.random() * 60,
              flickerOffset: Math.random() * 1000,
              colorTemp: Math.random() > 0.5 ? 0 : 0.15
            });
          }
        }
      }
      
      function initDustParticles() {
        dustParticles = [];
        for (let i = 0; i < 150; i++) {
          dustParticles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speedX: (Math.random() - 0.5) * 0.2,
            speedY: (Math.random() - 0.5) * 0.2,
            opacity: Math.random() * 0.25 + 0.1
          });
        }
      }
      
      function animateLights() {
        const elapsed = Date.now() - startTime;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        lights.forEach(light => {
          if (elapsed > light.turnOnTime) {
            const flicker = Math.sin((elapsed + light.flickerOffset) / 80) * 0.12;
            light.brightness = Math.min(light.brightness + 0.02, light.targetBrightness + flicker);
          }
          
          const warmth = 0.85 + light.colorTemp;
          const gradient = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, light.size * 5);
          gradient.addColorStop(0, `rgba(255, ${220 * warmth}, ${140 * warmth}, ${light.brightness * 0.95})`);
          gradient.addColorStop(0.3, `rgba(255, ${200 * warmth}, ${90 * warmth}, ${light.brightness * 0.6})`);
          gradient.addColorStop(1, 'rgba(255, 170, 50, 0)');
          
          ctx.beginPath();
          ctx.arc(light.x, light.y, light.size * 5, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();
          
          ctx.beginPath();
          ctx.arc(light.x, light.y, light.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, ${215 * warmth}, ${light.brightness})`;
          ctx.fill();
        });
        
        if (elapsed > 2500) {
          dustParticles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;
            
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 200, ${p.opacity * 0.6})`;
            ctx.fill();
          });
        }
        
        if (elapsed > 2000) {
          const ambientIntensity = Math.min((elapsed - 2000) / 3000, 0.5);
          const ambientGradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, canvas.width
          );
          ambientGradient.addColorStop(0, `rgba(255, 220, 150, ${ambientIntensity * 0.2})`);
          ambientGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
          
          ctx.fillStyle = ambientGradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        animationFrame = requestAnimationFrame(animateLights);
      }
      
      function showFeaturePresentation() {
        setTimeout(() => {
          featurePresentation.style.animation = 'none';
          featurePresentation.offsetHeight;
          featurePresentation.style.animation = 'featurePresentation 2s ease-out forwards';
        }, 7400);
      }
      
      function showCountdown() {
        const numbers = ['3', '2', '1'];
        let index = 0;
        
        function showNext() {
          if (index < numbers.length) {
            countdownCircle.textContent = numbers[index];
            countdownCircle.style.animation = 'none';
            countdownCircle.offsetHeight;
            countdownCircle.style.animation = 'countdown 1s ease-out forwards';
            index++;
            setTimeout(showNext, 1000);
          } else {
            countdownCircle.style.display = 'none';
          }
        }
        
        setTimeout(showNext, 5300);
      }
      
      function showFilmGrain() {
        setTimeout(() => {
          filmGrain.style.opacity = '1';
        }, 5000);
      }
      
      function openCurtains() {
        setTimeout(() => {
          curtainLeft.classList.add('open-left');
          curtainRight.classList.add('open-right');
        }, 4250);
      }
      
      function hideLoadingScreen() {
        cancelAnimationFrame(animationFrame);
        cancelAnimationFrame(grainAnimationFrame);
        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 1500);
      }
      
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      animateLights();
      showFilmGrain();
      openCurtains();
      showCountdown();
      showFeaturePresentation();
      playHiddenYoutube();
      
      setTimeout(hideLoadingScreen, 17000);
    }

      if (ra.length) c.push({title: 'Recently Added', movies: ra});

      if (fav.length) c.push({title: 'Family Favorites', movies: fav});
      const threeD = fr.filter(m => m.formats.includes('3D Blu-ray'));
      if (threeD.length) c.push({title: '3D Movies', movies: threeD});
      const tv = fr.filter(m => m.type === 'tv' || m.notes?.includes('TV Series'));
      if (tv.length) c.push({title: 'TV Series', movies: tv});
      const g = new Map();
      fr.forEach(m => m.genre?.forEach(h => { if (!g.has(h)) g.set(h, []); g.get(h).push(m); }));
      [...g.entries()].sort((a,b) => b[1].length - a[1].length).forEach(([t,m]) => { if (m.length >= 2) c.push({title: t, movies: m}); });
      const un = fr.filter(m => m.status !== 'available');
      if (un.length) c.push({title: 'Currently Checked Out', movies: un});

      // Fun bonus categories
      const yearOf = m => parseInt((m.tmdbData?.release_date || '').slice(0,4)) || 0;
      const runtimeOf = m => m.tmdbData?.runtime || 0;
      const ratingOf = m => m.tmdbData?.vote_average || 0;

      const push = (title, movies, min = 3) => { if (movies.length >= min) c.push({title, movies}); };

        if (y >= 1975 && y < 2000) s += 20;
        const gs = (m.genre || []).join(' ').toLowerCase();
        if (/adventure/.test(gs)) s += 10;
        if (/action|thriller/.test(gs)) s += 6;
        if (/family|sci.?fi|science fiction/.test(gs)) s += 5;
        if (/horror|drama|western/.test(gs)) s += 3;
        if (runtimeOf(m) >= 100 && runtimeOf(m) <= 150) s += 4;
        if (ratingOf(m) >= 7) s += 4;
        return s;
      };
      const driveIn = fr.filter(m => driveInScore(m) >= 10).sort((a,b) => driveInScore(b) - driveInScore(a)).slice(0, 20);
      push('🚗 Drive-In Double Feature', driveIn);

      return c;

          const r = t.vote_average ? t.vote_average.toFixed(1) : null;

          html += `<div class="modal-overlay fixed inset-0 z-[100] bg-black/80 flex items-start justify-center overflow-y-auto py-8 px-4" onclick="if(event.target===event.currentTarget)closeModal()"><div class="modal-content relative bg-[#181818] rounded-lg overflow-hidden max-w-3xl w-full shadow-2xl"><button onclick="closeModal()" class="absolute top-4 right-4 z-30 bg-[#141414]/80 hover:bg-[#141414] rounded-full p-2 text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>${(() => { const tr = trailerUrl(t); return `<div class="relative aspect-video bg-black">${tr ? `<iframe src="${tr}?autoplay=1&rel=0&modestbranding=1" title="Trailer" class="w-full h-full" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : t.backdrop_path ? `<img src="${IMG}/w1280${t.backdrop_path}" alt="${m.title}" class="w-full h-full object-cover" />` : '<div class="w-full h-full flex items-center justify-center text-gray-500">No trailer available</div>'}<div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-[#181818] to-transparent"></div></div>`; })()}<div class="px-6 md:px-10 pb-8 -mt-8 relative z-10"><div class="flex gap-6"><div class="hidden md:block flex-shrink-0 w-36 -mt-24 relative z-20">${t.poster_path ? `<img src="${IMG}/w500${t.poster_path}" alt="${m.title}" class="w-full rounded-lg shadow-xl" />` : '<div class="w-full aspect-[2/3] bg-[#2F2F2F] rounded-lg flex items-center justify-center text-gray-500 text-sm">No poster</div>'}</div><div class="flex-1 min-w-0"><h2 class="text-2xl md:text-3xl font-bold text-white mb-1">${m.title}</h2>${t.tagline ? `<p class="text-gray-400 italic text-sm mb-3">&ldquo;${t.tagline}&rdquo;</p>` : ''}<div class="flex flex-wrap items-center gap-3 text-sm text-gray-300 mb-4">${y ? `<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${y}</span>` : ''}${r ? `<span class="flex items-center gap-1 text-yellow-400"><svg class="w-3.5 h-3.5 fill-yellow-400" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${r}</span>` : ''}${t.runtime ? `<span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${Math.floor(t.runtime/60)}h ${t.runtime%60}m</span>` : ''}</div><div class="bg-[#141414] rounded-lg p-4 mb-4"><div class="flex flex-wrap gap-2 mb-3">${m.formats.map(badge).join('')}</div><div class="flex items-center gap-2 ${s.c.replace('text-','bg-').replace('400','400/10')} ${s.c} rounded px-3 py-2 text-sm"><span>${s.l}</span></div>${m.location ? `<div class="text-gray-400 text-sm mt-2">📍 ${m.location}</div>` : ''}${m.notes ? `<p class="text-gray-400 text-sm mt-2 italic">${m.notes}</p>` : ''}</div>${t.overview ? `<p class="text-gray-300 text-sm leading-relaxed mb-4">${t.overview}</p>` : ''}${(() => { const director = t.credits?.crew?.find(c => c.job === 'Director'); return director ? `<p class="text-sm text-gray-400 mb-2"><span class="text-gray-500">Directed by</span> <span class="text-white">${director.name}</span></p>` : ''; })()}${t.genres?.length ? `<div class="flex flex-wrap gap-2 mb-4">${t.genres.map(g => `<span class="text-xs bg-[#2F2F2F] text-gray-300 px-2.5 py-1 rounded-full">${g.name}</span>`).join('')}</div>` : ''}${(() => { const cast = t.credits?.cast?.slice(0, 8) || []; return cast.length ? `<div class="mb-2"><p class="text-sm text-gray-500 mb-1">Cast</p><div class="flex flex-wrap gap-x-3 gap-y-1 text-sm">${cast.map(c => `<span class="text-gray-300">${c.name}<span class="text-gray-600 ml-1 text-xs">as ${c.character}</span></span>`).join('')}</div></div>` : ''; })()}</div></div></div></div></div>`;
        }
      }

      document.getElementById('app').innerHTML = html;
    }

    load();
  </script>
</body>
